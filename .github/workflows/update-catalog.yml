name: Actualizar catálogo desde Google Sheets

on:
  # Se ejecuta automáticamente cada día a las 8am (hora Argentina = UTC-3)
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 8:00 Argentina

  # También se puede disparar manualmente desde GitHub
  workflow_dispatch:

  # Y también cuando subís cambios al repositorio
  push:
    branches:
      - main

jobs:
  actualizar-catalogo:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # 2. Instalar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Correr el script que descarga el Sheet y actualiza el HTML
      - name: Generar catálogo desde Google Sheets
        run: python generate.py

      # 4. Si hubo cambios, commitear y subir automáticamente
      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "Paladear Bot"
          git config --global user.email "bot@paladear.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🛒 Catálogo actualizado desde Google Sheets"
          git push
