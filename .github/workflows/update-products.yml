name: Actualizar snapshot de productos

on:
  schedule:
    # Lun-Sáb cada 2hs en horario comercial Argentina (UTC-3)
    # 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00 ART
    - cron: '0 11,13,15,17,19,21,23 * * 1-6'
  workflow_dispatch: # también se puede disparar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Descargar CSVs del Google Sheet
        run: |
          BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vT2RlZaSdlV-aaVGUw7YI9MVE1MHjopNhbjTOfWBZwPNo_clhJUao2KNcNowEzsdBGpd2Bh5-2rt1aH/pub"

          echo "📥 Descargando precios minorista..."
          curl -sL "${BASE}?gid=1674971004&single=true&output=csv" -o precios-min.csv

          echo "📥 Descargando info minorista..."
          curl -sL "${BASE}?gid=1603230501&single=true&output=csv" -o info-min.csv

          echo "📥 Descargando precios mayorista..."
          curl -sL "${BASE}?gid=545595949&single=true&output=csv" -o precios-may.csv

          echo "📥 Descargando info mayorista..."
          curl -sL "${BASE}?gid=896338689&single=true&output=csv" -o info-may.csv

          echo "✅ CSVs descargados:"
          wc -l precios-min.csv info-min.csv precios-may.csv info-may.csv

      - name: Commit si hubo cambios
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add precios-min.csv info-min.csv precios-may.csv info-may.csv
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos, nada que commitear."
          else
            git commit -m "📦 Snapshot de productos actualizado [skip ci]"
            git push
          fi
